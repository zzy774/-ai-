# ========================================
# LabReportWriter 自定义 FlatLaf 主题
# ========================================

# 主题基础
@theme=light

# 强调色（蓝色系 - 专业感）
@accentColor=#2196F3

# 前景色
@foreground=#333333

# 背景色
@background=#FAFAFA

# 组件背景
@componentBackground=#FFFFFF

# 文字区域背景
@textBackground=#FFFFFF

# 边框颜色
@borderColor=#E0E0E0

# 聚焦边框
@focusColor=#2196F3

# 选择背景
@selectionBackground=#BBDEFB
@selectionForeground=#333333

# 按钮背景
@buttonBackground=#FFFFFF

# 标题栏背景
@titleBarBackground=#2196F3
@titleBarForeground=#FFFFFF

# 菜单
@menuBackground=#FFFFFF
@menuForeground=#333333
@menuSelectionBackground=#E3F2FD

# 标签页
@tabbedPane.selectedBackground=#FFFFFF
@tabbedPane.underlineColor=#2196F3

# 表格
@table.background=#FFFFFF
@table.foreground=#333333
@table.gridColor=#E0E0E0

# 滚动条
@scroll.track=#F5F5F5
@scroll.thumb=#BDBDBD

# 字体
@defaultFont=Microsoft YaHei
@monospacedFont=Consolas
